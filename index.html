<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Cold Conspiracy</title>
  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at top, #111 0%, #000 100%);
      font-family: Georgia, "Times New Roman", serif;
      color: #f2efe8;
    }

    .container {
      max-width: 1000px;
      margin: 40px auto;
      text-align: center;
      padding: 0 20px;
    }

    h1 {
      font-size: 3rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 20px;
      text-shadow: 0 4px 12px rgba(0,0,0,0.8);
    }

    .comic {
      border: 6px solid #f2efe8;
      background: #000;
      box-shadow: 0 25px 70px rgba(0,0,0,0.9);
    }

    .comic img {
      width: 100%;
      height: auto;
      display: block;
    }

    .footer {
      margin-top: 20px;
      font-size: 0.95rem;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>The Cold Conspiracy</h1>

    <div class="comic">
      <img src="images/comic_noir.png" alt="Noir comic page of Warren planning the ultimate ice cream">
    </div>

    <div class="footer">A one-page comic noir experiment.</div>
  </div>
</body>
</html>
